apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 416225317325.dkr.ecr.us-east-1.amazonaws.com/aivle-miniproject6-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
